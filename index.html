<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المشتركين الاحترافية</title>
    <style>
        :root {
            --primary: linear-gradient(135deg, #2563eb, #1d4ed8);
            --success: linear-gradient(135deg, #16a34a, #15803d);
            --warning: linear-gradient(135deg, #d97706, #b45309);
            --danger: linear-gradient(135deg, #dc2626, #b91c1c);
            --bg: #e2e8f0;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 8px; font-size: 12px; min-height: 100vh; }
        body.modal-open .main-content { filter: blur(6px); pointer-events: none; }
        .container { max-width: 430px; margin: 0 auto; }
        header { text-align: center; margin: 6px 0 10px 0; }
        header h1 { font-size: 15px; font-weight: 800; color: #1e3a8a; }
        .search-container { margin-bottom: 8px; }
        .search-input { width: 100%; padding: 8px 12px; border-radius: var(--radius); border: 1px solid #cbd5e1; font-size: 12px; outline: none; }
        .renew-days-bar { display: flex; gap: 4px; margin-bottom: 8px; }
        .renew-day-btn { flex: 1; background: #0f172a; color: white; border: none; padding: 8px 4px; border-radius: var(--radius); font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
        .tabs { display: flex; background: #cbd5e1; padding: 2px; border-radius: var(--radius); margin-bottom: 8px; gap: 2px; }
        .tab-btn { flex: 1; padding: 6px 4px; border: none; background: none; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text-main); border-radius: 10px; display: flex; flex-direction: column; align-items: center; }
        .tab-btn span.count { font-size: 9px; background: #f1f5f9; padding: 1px 5px; border-radius: 20px; color: var(--text-main); margin-top: 2px; }
        .tab-btn.active { background: #2563eb; color: white; }
        .tab-btn.vault-tab { color: #b45309; font-weight: 800; }
        .tab-btn.vault-tab.active { background: #d97706; color: white; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .subscribers-list { display: flex; flex-direction: column; gap: 6px; }
        .user-card { background: var(--card-bg); border-radius: var(--radius); padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .user-card::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 5px; background: #cbd5e1; }
        .user-card.fully-paid::before { background: var(--success); }
        .user-card.partial-paid::before { background: var(--warning); }
        .user-card.unpaid::before { background: var(--danger); }
        .user-info-main h3 { font-size: 13px; font-weight: 700; color: #1e293b; }
        .countdown-text { font-size: 10px; color: var(--text-sub); margin-top: 2px; display: block; }
        .status-badge { font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 700; color: white; }
        .fully-paid .status-badge { background: var(--success); }
        .partial-paid .status-badge { background: var(--warning); }
        .unpaid .status-badge { background: var(--danger); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; padding: 16px; z-index: 9999; }
        .modal-card { background: #ffffff; width: 100%; max-width: 380px; border-radius: 16px; padding: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
        .close-modal-btn { background: #f1f5f9; border: none; width: 28px; height: 28px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .detail-item { background: #f8fafc; padding: 6px 8px; border-radius: 8px; border: 1px solid #f1f5f9; }
        .detail-item span { display: block; font-size: 9px; color: var(--text-sub); }
        .detail-item strong { color: var(--text-main); font-size: 13px; font-weight: 700; }
        .actions-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .action-link { flex: 1; text-decoration: none; text-align: center; padding: 8px; border-radius: 8px; font-weight: 700; color: white; display: flex; justify-content: center; align-items: center; }
        .btn-call { background: #16a34a; }
        .btn-whatsapp { background: #25d366; }
        .payment-action { display: flex; gap: 4px; margin-bottom: 6px; }
        .payment-input { flex: 1; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .submit-pay-btn { background: #2563eb; color: white; border: none; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .cash-calc-box { background: #fff7ed; padding: 6px; border-radius: 8px; border: 1px solid #ffedd5; display: flex; justify-content: space-between; }
        .history-box { background: #f8fafc; padding: 6px 8px; border-radius: 8px; max-height: 80px; overflow-y: auto; font-size: 10px; color: #475569; margin-top: 6px; }
        .vault-view { background: #0f172a; color: white; padding: 14px; border-radius: var(--radius); }
        .vault-auth { display: flex; gap: 6px; justify-content: center; padding: 20px 0; }
        .vault-input { padding: 8px; border-radius: 8px; border: none; width: 140px; text-align: center; }
        .vault-btn { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .vault-content { display: none; }
        .vault-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .vault-card-item { background: #1e293b; padding: 12px; border-radius: 8px; border-right: 4px solid #38bdf8; }
        .eye-btn { width: 100%; background: #334155; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .no-results, .loading { text-align: center; padding: 20px; background: white; border-radius: var(--radius); font-weight: bold; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="container">
        <header><h1>نظام إدارة المشتركين والاتصالات</h1></header>
        <div class="renew-days-bar">
            <button class="renew-day-btn" onclick="autoRenewByDay(8)">🔄 تجديد يوم 8</button>
            <button class="renew-day-btn" onclick="autoRenewByDay(18)">🔄 تجديد يوم 18</button>
            <button class="renew-day-btn" onclick="autoRenewByDay(20)">🔄 تجديد يوم 20</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث باسم العميل..." oninput="handleSearch()">
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">الكل <span class="count" id="count-all">0</span></button>
            <button class="tab-btn" id="tab-unpaid" onclick="switchTab('unpaid')">لم يدفع <span class="count" id="count-unpaid">0</span></button>
            <button class="tab-btn" id="tab-partial" onclick="switchTab('partial')">جزئي <span class="count" id="count-partial">0</span></button>
            <button class="tab-btn" id="tab-paid" onclick="switchTab('paid')">كامل <span class="count" id="count-paid">0</span></button>
            <button class="tab-btn vault-tab" id="tab-vault" onclick="switchTab('vault')">🔒 الخزنة</button>
        </div>
        <div id="list-section" class="section-content active">
            <div id="subscribersList" class="subscribers-list">
                <div class="loading">جاري المزامنة مع جوجل شيت... 🔄</div>
            </div>
        </div>
        <div id="vault-section" class="section-content">
            <div class="vault-view">
                <div class="vault-auth" id="vaultAuthBox">
                    <input type="password" id="vaultPassword" class="vault-input" placeholder="أدخل الرمز">
                    <button class="vault-btn" onclick="unlockVault()">فتح</button>
                </div>
                <div class="vault-content" id="vaultContent">
                    <button class="eye-btn" onclick="toggleNumbersVisibility()">👁️ كشف / إخفاء الحسابات</button>
                    <div class="vault-grid">
                        <div class="vault-card-item" style="border-right-color: #16a34a;"><span>💰 إجمالي الكاش الفعلي</span><strong id="v-cash">****</strong></div>
                        <div class="vault-card-item" style="border-right-color: #dc2626;"><span>💸 ديون قديمة متأخرة</span><strong id="v-old-debts">****</strong></div>
                        <div class="vault-card-item" style="border-right-color: #d97706;"><span>🔴 متبقي باقات الشهر الحالى</span><strong id="v-current-debt">****</strong></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="detailsModal" onclick="closeModalOutside(event)">
    <div class="modal-card">
        <div class="modal-header"><h2 id="m-name">اسم المشترك</h2><button class="close-modal-btn" onclick="closeModal()">✕</button></div>
        <div class="modal-grid">
            <div class="detail-item"><span>📅 ميعاد التجديد</span><strong id="m-renew-day">0</strong></div>
            <div class="detail-item"><span>💵 باقة الشهر</span><strong id="m-price">0 ج</strong></div>
            <div class="detail-item"><span>🛑 ديون قديمة</span><strong id="m-debt">0 ج</strong></div>
            <div class="detail-item"><span>✅ تم سداده</span><strong id="m-paid" style="color: #16a34a;">0 ج</strong></div>
            <div class="detail-item" style="grid-column: span 2; background: #f1f5f9;"><span>🚨 مجموع المتبقي عليه</span><strong id="m-remaining">0 ج</strong></div>
        </div>
        <div class="actions-row">
            <a href="#" id="m-link-call" class="action-link btn-call">📞 رن مكالمة</a>
            <a href="#" id="m-link-wa" target="_blank" class="action-link btn-whatsapp">💬 واتساب</a>
        </div>
        <div class="payment-action">
            <input type="number" class="payment-input" id="m-pay-input" placeholder="المبلغ للخصم..." oninput="calcModalCashFees()">
            <button class="submit-pay-btn" id="m-pay-btn">دفع الآن</button>
        </div>
        <div class="cash-calc-box" id="m-calc-box" style="display:none;"><span>بشامل رسوم كاش (+1%):</span><strong id="m-calc-text">0 ج</strong></div>
        <div class="history-box"><div id="m-history-content"></div></div>
    </div>
</div>

<script>
    // الرابط الفعلي والمعدل رسمي 🚀
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwls53YP30NR3X6rprAvIeLPHoqF1cNhRZpWHBKBc1FC7I-rLShHY00nNTEu2qhYtay/exec"; 

    let subscribers = [];
    let currentTab = 'all'; let searchQuery = ''; let isVaultUnlocked = false; let showNumbers = false;

    async function loadData() {
        try {
            const response = await fetch(SHEET_API_URL);
            const dataFromSheet = await response.json();
            if (dataFromSheet && dataFromSheet.length > 0) {
                subscribers = dataFromSheet.slice(1).map((vals, index) => {
                    return {
                        id: parseInt(vals[0]) || (index + 1), 
                        name: vals[1] || "اسم غير مسجل",         
                        phone: vals[2] || "",                 
                        renewDay: parseInt(vals[3]) || 8,     
                        packagePrice: parseFloat(vals[4]) || 0, 
                        previousDebt: parseFloat(vals[5]) || 0, 
                        currentPaid: parseFloat(vals[6]) || 0,  
                        history: vals[7] ? (vals[7].toString().startsWith('[') ? JSON.parse(vals[7]) : [vals[7]]) : [] 
                    };
                });
                render();
            }
        } catch (error) {
            document.getElementById('subscribersList').innerHTML = `<div class="no-results" style="color:red;">❌ خطأ اتصال حرج. تأكد من فتح صلاحية الوصول للشيت كـ "Anyone with link"!</div>`;
        }
    }

    function getSubscriberStatus(sub) {
        const totalRequired = sub.packagePrice + sub.previousDebt;
        const remaining = totalRequired - sub.currentPaid;
        let status = 'unpaid'; let statusText = 'لم يدفع';
        if (sub.currentPaid >= totalRequired) { status = 'fully-paid'; statusText = 'كامل الدفع'; }
        else if (sub.currentPaid > 0 && sub.currentPaid < totalRequired) { status = 'partial-paid'; statusText = 'دفع جزئي'; }
        return { totalRequired, remaining, status, statusText };
    }

    function updateCounters() {
        document.getElementById('count-all').innerText = subscribers.length;
        document.getElementById('count-paid').innerText = subscribers.filter(s => getSubscriberStatus(s).status === 'fully-paid').length;
        document.getElementById('count-partial').innerText = subscribers.filter(s => getSubscriberStatus(s).status === 'partial-paid').length;
        document.getElementById('count-unpaid').innerText = subscribers.filter(s => getSubscriberStatus(s).status === 'unpaid').length;
        calculateVaultData();
    }

    function render() {
        const listContainer = document.getElementById('subscribersList');
        if (subscribers.length === 0) return;
        listContainer.innerHTML = '';
        if (currentTab === 'vault') return;

        let filtered = subscribers;
        if (currentTab === 'paid') filtered = subscribers.filter(s => getSubscriberStatus(s).status === 'fully-paid');
        if (currentTab === 'partial') filtered = subscribers.filter(s => getSubscriberStatus(s).status === 'partial-paid');
        if (currentTab === 'unpaid') filtered = subscribers.filter(s => getSubscriberStatus(s).status === 'unpaid');
        if (searchQuery.trim() !== '') filtered = filtered.filter(s => s.name.toString().includes(searchQuery.trim()));

        filtered.forEach(sub => {
            const { status, statusText } = getSubscriberStatus(sub);
            const card = document.createElement('div');
            card.className = `user-card ${status}`;
            card.setAttribute('onclick', `openSubscriberModal(${sub.id})`);
            card.innerHTML = `<div class="user-info-main"><h3>${sub.name}</h3><span class="countdown-text">📅 ميعاد تجديده يوم ${sub.renewDay}</span></div><span class="status-badge">${statusText}</span>`;
            listContainer.appendChild(card);
        });
        updateCounters();
    }

    function openSubscriberModal(id) {
        const sub = subscribers.find(s => s.id === id); 
        if(!sub) return;
        const { remaining } = getSubscriberStatus(sub);
        let cleanPhone = sub.phone.toString().startsWith('0') ? sub.phone.toString() : '0' + sub.phone.toString();

        document.getElementById('m-name').innerText = sub.name;
        document.getElementById('m-renew-day').innerText = `يوم ${sub.renewDay}`;
        document.getElementById('m-price').innerText = sub.packagePrice + " ج";
        document.getElementById('m-debt').innerText = sub.previousDebt + " ج";
        document.getElementById('m-paid').innerText = sub.currentPaid + " ج";
        document.getElementById('m-remaining').innerText = remaining + " ج";
        document.getElementById('m-remaining').style.color = remaining > 0 ? '#dc2626' : '#16a34a';

        document.getElementById('m-link-call').setAttribute('href', `tel:${cleanPhone}`);
        document.getElementById('m-link-wa').setAttribute('href', `https://wa.me/2${cleanPhone}?text=${encodeURIComponent('متبقي عليك ' + remaining + ' ج')}`);
        document.getElementById('m-pay-btn').onclick = function() { submitModalPayment(id); };
        document.getElementById('m-history-content').innerHTML = sub.history.map(h => `<div>${h}</div>`).join('') || 'لا توجد عمليات مسجلة';

        document.getElementById('detailsModal').style.display = 'flex'; 
        document.body.classList.add('modal-open'); 
    }

    function submitModalPayment(id) {
        const amount = parseFloat(document.getElementById('m-pay-input').value);
        if (isNaN(amount) || amount <= 0) return;
        document.getElementById('m-pay-btn').innerText = "جاري الحفظ...";

        fetch(`${SHEET_API_URL}?action=pay&id=${id}&amount=${amount}`, { method: 'POST', mode: 'no-cors' })
        .then(() => console.log('Sent'))
        .finally(() => {
            closeModal();
            setTimeout(loadData, 1500);
        });
    }

    function autoRenewByDay(dayNumber) {
        document.getElementById('subscribersList').innerHTML = `<div class="loading">جاري التحديث... 🔄</div>`;
        fetch(`${SHEET_API_URL}?action=renew&day=${dayNumber}`, { method: 'POST', mode: 'no-cors' })
        .finally(() => setTimeout(loadData, 1500));
    }

    function closeModal() { document.getElementById('detailsModal').style.display = 'none'; document.body.classList.remove('modal-open'); }
    function closeModalOutside(e) { if(e.target.id === 'detailsModal') closeModal(); }
    function calcModalCashFees() { const val = parseFloat(document.getElementById('m-pay-input').value); document.getElementById('m-calc-box').style.display = val > 0 ? 'flex' : 'none'; document.getElementById('m-calc-text').innerText = Math.ceil(val + Math.max(3, val * 0.01)) + " ج"; }
    function unlockVault() { if(document.getElementById('vaultPassword').value === "1234") { isVaultUnlocked = true; document.getElementById('vaultAuthBox').style.display = 'none'; document.getElementById('vaultContent').style.display = 'block'; calculateVaultData(); } }
    function calculateVaultData() { if(!isVaultUnlocked || !showNumbers) return; let c=0, d=0, r=0; subscribers.forEach(s => { c+=s.currentPaid; d+=s.previousDebt; let left = s.packagePrice-s.currentPaid; if(left>0) r+=left; }); document.getElementById('v-cash').innerText = c+" ج"; document.getElementById('v-old-debts').innerText = d+" ج"; document.getElementById('v-current-debt').innerText = r+" ج"; }
    function toggleNumbersVisibility() { showNumbers = !showNumbers; if(showNumbers) calculateVaultData(); else { document.getElementById('v-cash').innerText = "****"; document.getElementById('v-old-debts').innerText = "****"; document.getElementById('v-current-debt').innerText = "****"; } }
    function switchTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active'); if(t==='vault') { document.getElementById('list-section').classList.remove('active'); document.getElementById('vault-section').classList.add('active'); calculateVaultData(); } else { document.getElementById('vault-section').classList.remove('active'); document.getElementById('list-section').classList.add('active'); render(); } }
    function handleSearch() { searchQuery = document.getElementById('searchInput').value; render(); }

    loadData();
</script>
</body>
</html>
